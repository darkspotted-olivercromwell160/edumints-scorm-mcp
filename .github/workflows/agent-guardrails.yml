# .github/workflows/agent-guardrails.yml
# Ajan PR'ları için güven duvarı: (1) çakışan file_area, (2) provenance, (3) yetenek defteri.
# Bu, pytest/vitest/ruff/axe/XSD kapılarına EK güvenlik katmanıdır (onları kırmaz).
name: agent-guardrails

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - name: Değişen dosyalar
        id: diff
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          git diff --name-only "$base" "$head" > changed.txt
          echo "Değişen dosyalar:"; cat changed.txt

      # NOT: Public CI yalnız sızıntı-güvenli kapıları çalıştırır: provenance + file_area çakışması.
      # İlerleme/yetenek takibi ve derin denetim maintainer tarafında yürütülür.

      - name: (1) Provenance — eklenen medya köken kaydı gerektirir
        run: |
          python3 - <<'PY'
          import sys, os, json, glob
          changed = [l.strip() for l in open("changed.txt") if l.strip()]
          media_ext = (".png",".jpg",".jpeg",".gif",".webp",".svg",".mp3",".wav",".mp4",".webm")
          media = [c for c in changed if c.lower().endswith(media_ext)
                   and ("/assets/" in c or c.startswith("examples/") or "/media/" in c)]
          if not media:
              print("✓ eklenen medya yok"); sys.exit(0)
          # Köken kaydı: aynı dizinde provenance.json ya da assets manifestinde 'asset' eşleşmesi
          allowed = {"ai-generated","cc0","public-domain","own","local"}
          missing = []
          for m in media:
              d = os.path.dirname(m); base = os.path.basename(m)
              recs = []
              for pj in glob.glob(os.path.join(d, "provenance.json")) + glob.glob(os.path.join(d, "*.provenance.json")):
                  try:
                      data = json.load(open(pj)); recs += data if isinstance(data, list) else [data]
                  except Exception: pass
              ok = any(base in (r.get("asset","")) and r.get("source") in allowed for r in recs)
              if not ok: missing.append(m)
          if missing:
              print("✗ Köken kaydı (provenance) eksik/geçersiz medya (AGENTS.md §11):")
              [print("   -", m) for m in missing]
              print("   izinli source: ai-generated|cc0|public-domain|own|local")
              sys.exit(1)
          print("✓ provenance OK")
          PY

      - name: (2) Çakışan file_area — diğer açık ajan PR'larıyla kesişim (uyarı)
        if: ${{ !cancelled() }}
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          # Bu PR'ın kök dizinleri
          mine=$(cut -d/ -f1-2 changed.txt | sort -u)
          echo "Bu PR alanları:"; echo "$mine"
          # Açık ajan PR'larını listele (label agent:*), kendi numaramız hariç
          others=$(gh pr list --repo "${{ github.repository }}" --state open \
                   --json number,labels,files --jq \
                   '.[] | select(.labels[].name|startswith("agent:")) | .number' 2>/dev/null | sort -u || true)
          conflict=0
          for pr in $others; do
            [[ "$pr" == "${{ github.event.pull_request.number }}" ]] && continue
            theirs=$(gh pr view "$pr" --repo "${{ github.repository }}" --json files \
                     --jq '.files[].path' 2>/dev/null | cut -d/ -f1-2 | sort -u || true)
            inter=$(comm -12 <(echo "$mine") <(echo "$theirs") || true)
            if [[ -n "$inter" ]]; then
              echo "⚠ PR #$pr ile çakışan alan: $inter"; conflict=1
            fi
          done
          [[ "$conflict" == "1" ]] && echo "::warning::Açık ajan PR'larıyla file_area çakışması var — serileştir." || echo "✓ çakışma yok"
          exit 0
